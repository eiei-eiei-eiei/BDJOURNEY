<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ff7a9c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>BDJourney</title>
<script src="https://unpkg.com/exifr@7.1.3/dist/full.umd.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<style>
:root{--pink:#ff7a9c;--pink-soft:#ffd9e2;--pink-bg:#fff5f7;--ink:#3a2c30;--muted:#9a8a8f;--shadow:0 4px 18px rgba(255,122,156,.15)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,"Segoe UI",sans-serif;background:var(--pink-bg);color:var(--ink)}
.hidden{display:none!important}

/* ── lock ── */
.lock{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#ffe3ea,#ffd0dd);padding-top:env(safe-area-inset-top)}
.lock-card{text-align:center;width:300px}
.lock-heart{font-size:52px;animation:beat 1.4s infinite}
@keyframes beat{0%,100%{transform:scale(1)}20%{transform:scale(1.2)}40%{transform:scale(1)}}
.lock-card h1{margin:6px 0 2px;font-size:26px;color:var(--pink)}
.lock-sub{color:var(--muted);font-size:13px;margin-bottom:22px}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:10px}
.pin-dots span{width:14px;height:14px;border-radius:50%;border:2px solid var(--pink);transition:.15s}
.pin-dots span.on{background:var(--pink)}
.pin-error{color:#e8456b;height:18px;font-size:13px}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px}
.keypad button{height:64px;border:none;border-radius:50%;font-size:24px;background:#fff;color:var(--ink);box-shadow:var(--shadow);cursor:pointer;transition:.1s}
.keypad button:active{transform:scale(.92);background:var(--pink-soft)}
.keypad .ghost{background:transparent;box-shadow:none;color:var(--pink)}

/* ── shell ── */
.app{min-height:100vh;padding-bottom:calc(76px + env(safe-area-inset-bottom))}

/* ── topbar ── */
.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;padding:calc(12px + env(safe-area-inset-top)) 16px 12px;background:rgba(255,245,247,.92);backdrop-filter:blur(10px);min-height:calc(52px + env(safe-area-inset-top))}
.brand{font-weight:700;color:var(--pink);font-size:18px;flex:1;transition:opacity .2s}
.topbar-search-wrap{flex:1;display:none;align-items:center;gap:8px}
.topbar-search-wrap input{flex:1;border:1.5px solid var(--pink);border-radius:22px;padding:7px 14px;font-size:15px;font-family:inherit;background:#fff;outline:none;color:var(--ink)}
.topbar-search-wrap .x-btn{border:none;background:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px 2px;flex-shrink:0}
.topbar.searching .brand{display:none}
.topbar.searching .topbar-search-wrap{display:flex}
.search-toggle{border:none;background:none;cursor:pointer;padding:6px;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.search-toggle svg{width:20px;height:20px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round}
.topbar.searching .search-toggle svg{stroke:var(--pink)}

/* ── view ── */
.view{padding:12px 16px;max-width:560px;margin:0 auto}

/* ── tabbar ── */
.tabbar{position:fixed;bottom:0;left:0;right:0;display:flex;background:#fff;border-top:1px solid var(--pink-soft);padding:6px 0 calc(10px + env(safe-area-inset-bottom));z-index:10}
.tab{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:20px;color:var(--muted)}
.tab span{font-size:11px}.tab.active{color:var(--pink)}

/* ── FAB ── */
.fab{position:fixed;bottom:calc(80px + env(safe-area-inset-bottom));right:20px;width:54px;height:54px;border-radius:50%;background:var(--pink);color:#fff;font-size:26px;border:none;box-shadow:0 4px 18px rgba(255,122,156,.45);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;transition:.15s}
.fab:active{transform:scale(.92)}

/* ── entry cards ── */
.entry{background:#fff;border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow);cursor:pointer;transition:.1s}
.entry:active{transform:scale(.99)}
.entry-date{font-size:12px;color:var(--pink);font-weight:600}
.entry-title{font-size:17px;font-weight:700;margin:4px 0}
.entry-body{color:#5a4a4e;font-size:14px;white-space:pre-wrap;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.entry-meta{font-size:12px;color:var(--muted);margin-top:8px}
.entry-thumb{height:90px;width:90px;border-radius:12px;object-fit:cover;background:var(--pink-soft);flex-shrink:0}
.mood-badge{font-size:20px}
.empty{text-align:center;color:var(--muted);padding:60px 20px}.empty .big{font-size:48px}
.section-title{font-size:13px;color:var(--muted);margin:4px 0 12px;font-weight:600}
.day-divider{font-size:12px;color:var(--muted);font-weight:600;margin:18px 0 8px;text-align:center;letter-spacing:.5px}

/* ── story viewer (IG-style) ── */
.story-viewer{position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;color:#fff;overflow:hidden}
.sv-bars{display:flex;gap:3px;padding:8px 10px 0;padding-top:calc(env(safe-area-inset-top) + 8px);position:relative;z-index:3}
.sv-bar{flex:1;height:2.5px;background:rgba(255,255,255,.35);border-radius:2px;overflow:hidden;min-width:4px}
.sv-bar-fill{height:100%;background:#fff;width:0%;transition:width .05s linear}
.sv-header{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 14px 8px;position:relative;z-index:3;pointer-events:none}
.sv-header .sv-close{pointer-events:auto}
.sv-meta{flex:1;min-width:0}
.sv-title{font-size:15px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sv-years{font-size:12px;opacity:.85;text-shadow:0 1px 4px rgba(0,0,0,.6);margin-top:2px}
.sv-close{background:rgba(0,0,0,.3);border:none;color:#fff;font-size:22px;width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:10px}
.sv-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;z-index:1}
.sv-textonly{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;z-index:1;background:linear-gradient(160deg,#ff7a9c,#ffb3c6);padding:40px 20px}
.sv-overlay{position:absolute;inset:0;display:flex;z-index:2;transition:opacity .15s}
.sv-zone{height:100%;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.sv-zone-left{width:30%}.sv-zone-center{width:40%}.sv-zone-right{width:30%}

/* ── story bar ── */
.story-bar{display:flex;gap:12px;overflow-x:auto;padding:4px 16px 12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.story-bar::-webkit-scrollbar{display:none}
.story-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;flex-shrink:0}
.story-ring{width:62px;height:62px;border-radius:50%;padding:2px;background:linear-gradient(135deg,var(--pink),#ffb3c6);box-shadow:var(--shadow)}
.story-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:2px solid #fff;background:var(--pink-soft)}
.story-ring .story-emoji{width:100%;height:100%;border-radius:50%;border:2px solid #fff;background:var(--pink-soft);display:flex;align-items:center;justify-content:center;font-size:26px}
.story-label{font-size:10px;color:var(--muted);max-width:62px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── calendar ── */
.cal-jump{display:flex;gap:8px;margin-bottom:14px}
.cal-jump select{flex:1;padding:8px 10px;border:1px solid var(--pink-soft);border-radius:12px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink);appearance:none;text-align:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:11px;color:var(--muted);padding:4px 0}
.cal-cell{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;background:#fff;position:relative;overflow:hidden}
.cal-cell.has{cursor:pointer}
.cal-cell.has img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.85}
.cal-cell.has .cal-num{position:relative;z-index:1;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6);font-size:12px}
.cal-cell.blank{background:transparent}
.cal-cell.today{box-shadow:0 0 0 2px var(--pink)}
.cal-month-block{margin-bottom:28px;scroll-margin-top:8px}
.cal-month-label{font-weight:700;font-size:15px;margin-bottom:8px;color:var(--ink)}

/* ── full-screen page (detail / editor) ── */
.page{position:fixed;inset:0;z-index:50;background:#fff;display:flex;flex-direction:column;animation:slideInRight .22s ease-out}
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
.page-head{display:flex;align-items:center;gap:10px;padding:calc(14px + env(safe-area-inset-top)) 16px 14px;background:#fff;border-bottom:1px solid var(--pink-soft);position:sticky;top:0;z-index:2;flex-shrink:0}
.page-head .back-btn{border:none;background:none;color:var(--pink);font-size:17px;cursor:pointer;padding:4px 6px 4px 0;display:flex;align-items:center;gap:4px;font-weight:600}
.page-head .page-title{flex:1;font-weight:700;font-size:17px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.page-head .action-btn{border:none;background:var(--pink-soft);color:var(--pink);padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0}
.page-body{flex:1;overflow-y:auto;padding:0 18px calc(32px + env(safe-area-inset-bottom))}
.page-body label{display:block;font-size:13px;color:var(--muted);margin:16px 0 6px;font-weight:500}
.page-body input[type=text],.page-body input[type=date],.page-body textarea{width:100%;padding:11px 13px;border:1px solid var(--pink-soft);border-radius:12px;font-size:15px;font-family:inherit;background:var(--pink-bg);color:var(--ink)}
.page-body textarea{resize:vertical}

/* ── detail content ── */
.detail-photos{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:14px}
.detail-photos img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:14px;background:var(--pink-soft);cursor:zoom-in}
.detail-body{font-size:15px;color:#5a4a4e;white-space:pre-wrap;line-height:1.75;margin-top:10px}
.detail-title{font-size:22px;font-weight:700;margin:8px 0 4px;line-height:1.3}
.detail-date{font-size:13px;color:var(--pink);font-weight:600;margin-top:16px}
.detail-meta{font-size:13px;color:var(--muted);margin-top:8px}

/* ── editor specifics ── */
.mood-picker{display:flex;gap:8px;flex-wrap:wrap}
.mood-picker span{font-size:26px;cursor:pointer;padding:4px;border-radius:10px;opacity:.5;transition:.1s}
.mood-picker span.sel{opacity:1;background:var(--pink-soft);transform:scale(1.1)}
.photo-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.photo-preview .pp{position:relative}
.photo-preview img{height:72px;width:72px;object-fit:cover;border-radius:10px;background:var(--pink-soft)}
.photo-preview .del{position:absolute;top:-6px;right:-6px;background:#e8456b;color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer}
.row-btns{display:flex;gap:10px;margin-top:24px;padding-bottom:8px}
.row-btns button{flex:1;border:none;padding:13px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer}
.primary{background:var(--pink);color:#fff}.danger{background:#ffe0e6;color:#e8456b}

/* ── day list modal (bottom sheet) ── */
.sheet{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.35)}
.sheet-card{background:#fff;width:100%;max-width:560px;border-radius:24px 24px 0 0;max-height:75vh;overflow-y:auto;animation:slideUp .22s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;font-weight:700;font-size:16px;position:sticky;top:0;background:#fff;border-bottom:1px solid var(--pink-soft)}
.sheet-head .x{border:none;background:none;font-size:18px;cursor:pointer;color:var(--muted)}
.sheet-body{padding:12px 18px calc(20px + env(safe-area-inset-bottom))}
.day-entry{background:var(--pink-bg);border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer}
.day-entry:active{opacity:.85}

/* ── lightbox ── */
.lightbox{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center}
.lightbox img{max-width:100%;max-height:100%;object-fit:contain}
.lightbox-close{position:absolute;top:calc(16px + env(safe-area-inset-top));right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer}
.lightbox-prev,.lightbox-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer}
.lightbox-prev{left:12px}.lightbox-next{right:12px}

/* ── atlas ── */
#atlasMap{position:fixed;top:0;left:0;right:0;bottom:0;z-index:5;display:none}
#atlasMap.visible{display:block}
.atlas-active .topbar{z-index:6}.atlas-active .tabbar{z-index:6}.atlas-active .fab{z-index:6}.atlas-active #view{display:none}
.atlas-no-loc{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:24px 28px;border-radius:18px;text-align:center;box-shadow:var(--shadow);z-index:10;max-width:260px}
.photo-marker{width:52px;height:52px;border-radius:12px;border:3px solid #fff;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.3);background:var(--pink-soft)}
.photo-marker img{width:100%;height:100%;object-fit:cover}
.photo-marker.no-photo{background:var(--pink);display:flex;align-items:center;justify-content:center;font-size:22px}

/* ── loading / toast ── */
.loading{position:fixed;inset:0;background:rgba(255,245,247,.6);display:flex;align-items:center;justify-content:center;z-index:99}
.spinner{width:40px;height:40px;border:4px solid var(--pink-soft);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#3a2c30;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:120;opacity:0;transition:.3s;white-space:nowrap}
.toast.show{opacity:.95}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock" class="lock">
  <div class="lock-card">
    <div class="lock-heart">💗</div>
    <h1>BDJourney</h1>
    <p class="lock-sub">Enter your PIN to continue</p>
    <div id="pinDots" class="pin-dots"><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div id="pinError" class="pin-error"></div>
    <div class="keypad">
      <button onclick="pinPress('1')">1</button><button onclick="pinPress('2')">2</button><button onclick="pinPress('3')">3</button>
      <button onclick="pinPress('4')">4</button><button onclick="pinPress('5')">5</button><button onclick="pinPress('6')">6</button>
      <button onclick="pinPress('7')">7</button><button onclick="pinPress('8')">8</button><button onclick="pinPress('9')">9</button>
      <button class="ghost" onclick="pinClear()">C</button><button onclick="pinPress('0')">0</button><button class="ghost" onclick="pinDel()">⌫</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <header class="topbar" id="topbar">
    <div class="brand">💗 BDJourney</div>
    <div class="topbar-search-wrap" id="searchWrap">
      <input type="search" id="searchInput" placeholder="Search entries..." oninput="onSearch(this.value)" autocomplete="off">
      <button class="x-btn" onclick="clearSearch()">✕</button>
    </div>
    <button class="search-toggle" id="searchToggle" onclick="toggleSearch()" aria-label="Search">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    </button>
  </header>
  <main id="view" class="view"></main>
  <button class="fab" onclick="openEditor()">＋</button>
  <nav class="tabbar">
    <button class="tab active" data-tab="timeline" onclick="switchTab('timeline')">📖<span>Journey</span></button>
    <button class="tab" data-tab="calendar" onclick="switchTab('calendar')">📅<span>Calendar</span></button>
    <button class="tab" data-tab="atlas" onclick="switchTab('atlas')">🗺️<span>Atlas</span></button>
  </nav>
</div>

<!-- ATLAS MAP -->
<div id="atlasMap"></div>

<!-- DETAIL PAGE (full-screen) -->
<div id="detail" class="page hidden">
  <div class="page-head">
    <button class="back-btn" onclick="closeDetail()">‹ Back</button>
    <span class="page-title" id="detailTitle"></span>
    <button class="action-btn" onclick="editFromDetail()">Edit</button>
  </div>
  <div class="page-body" id="detailBody"></div>
</div>

<!-- EDITOR PAGE (full-screen) -->
<div id="editor" class="page hidden">
  <div class="page-head">
    <button class="back-btn" onclick="closeEditor()">‹ Back</button>
    <span class="page-title" id="editorTitle">New Entry</span>
    <button class="action-btn primary" id="saveBtn" onclick="saveEntry()">Save</button>
  </div>
  <div class="page-body">
    <input type="hidden" id="f_id">
    <input type="hidden" id="f_lat">
    <input type="hidden" id="f_lng">
    <label>Date</label><input type="date" id="f_date">
    <label>Title</label><input type="text" id="f_title" placeholder="What happened today..." autocomplete="off" autocorrect="off" spellcheck="false">
    <label>Mood</label>
    <div id="moodPicker" class="mood-picker">
      <span onclick="pickMood(this,'😍')">😍</span><span onclick="pickMood(this,'😊')">😊</span><span onclick="pickMood(this,'🥰')">🥰</span>
      <span onclick="pickMood(this,'😌')">😌</span><span onclick="pickMood(this,'😢')">😢</span><span onclick="pickMood(this,'😡')">😡</span><span onclick="pickMood(this,'🤗')">🤗</span>
    </div>
    <label>Story</label><textarea id="f_body" rows="7" placeholder="Write your story..."></textarea>
    <label>Location (optional)</label><input type="text" id="f_location" placeholder="e.g. Coffee shop, Beach...">
    <div id="gpsStatus" style="font-size:12px;margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span id="gpsLabel" style="color:var(--muted)">📍 GPS will be read from photo</span>
      <button type="button" id="pickMapBtn" onclick="openMapPicker()" style="border:none;background:var(--pink-soft);color:var(--pink);padding:3px 10px;border-radius:12px;font-size:12px;cursor:pointer;flex-shrink:0">📍 Pick on map</button>
      <button type="button" id="clearGpsBtn" onclick="clearGps()" class="hidden" style="border:none;background:#ffe0e6;color:#e8456b;padding:3px 8px;border-radius:12px;font-size:12px;cursor:pointer;flex-shrink:0">✕ Clear</button>
    </div>
    <label>Photos</label><input type="file" id="f_photos" accept="image/*" multiple onchange="previewPhotos()">
    <div id="photoPreview" class="photo-preview"></div>
    <div id="existingPhotos" class="photo-preview"></div>
    <div class="row-btns">
      <button id="deleteBtn" class="danger hidden" onclick="removeEntry()">Delete</button>
    </div>
  </div>
</div>

<!-- MAP PICKER -->
<div id="mapPickerModal" class="sheet hidden">
  <div class="sheet-card" style="height:88vh;display:flex;flex-direction:column;border-radius:24px 24px 0 0;overflow:hidden">
    <div class="sheet-head" style="flex-direction:column;align-items:stretch;gap:8px;padding-bottom:10px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:700">Pick Location</span>
        <button class="x" onclick="closeMapPicker()">✕</button>
      </div>
      <div style="position:relative">
        <input id="mapSearchInput" type="search" placeholder="Search place, landmark..." autocomplete="off"
          oninput="onMapSearch(this.value)"
          style="width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--pink-soft);border-radius:12px;font-size:14px;font-family:inherit;background:var(--pink-bg);outline:none;color:var(--ink)">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none">🔍</span>
        <div id="mapSearchResults" style="position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,.15);z-index:9999;max-height:200px;overflow-y:auto;display:none"></div>
      </div>
    </div>
    <div style="position:relative;flex:1;min-height:0">
      <div id="mapPickerMap" style="position:absolute;inset:0"></div>
      <button type="button" onclick="useMyLocation()" title="Use my current location"
        style="position:absolute;right:12px;bottom:12px;z-index:1000;background:#fff;border:none;width:46px;height:46px;border-radius:50%;box-shadow:0 2px 10px rgba(0,0,0,.25);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center">📍</button>
    </div>
    <div style="padding:10px 16px calc(14px + env(safe-area-inset-bottom));background:#fff;border-top:1px solid var(--pink-soft)">
      <div id="mapPickerCoords" style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:8px">Tap on map to drop a pin</div>
      <button id="mapPickerConfirm" onclick="confirmMapPicker()" style="width:100%;padding:13px;border:none;border-radius:14px;background:var(--pink);color:#fff;font-size:15px;font-weight:600;cursor:pointer" disabled>Confirm Location</button>
    </div>
  </div>
</div>

<!-- DAY SHEET (bottom sheet) -->
<div id="dayModal" class="sheet hidden">
  <div class="sheet-card">
    <div class="sheet-head"><span id="dayModalTitle"></span><button class="x" onclick="closeDayModal()">✕</button></div>
    <div class="sheet-body" id="dayModalBody"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<!-- STORY VIEWER -->
<div id="storyViewer" class="story-viewer hidden">
  <div id="svBars" class="sv-bars"></div>
  <div class="sv-header">
    <div class="sv-meta">
      <div id="svTitle" class="sv-title"></div>
      <div id="svYears" class="sv-years"></div>
    </div>
    <button class="sv-close" onclick="closeStoryViewer()">✕</button>
  </div>
  <img id="svImg" class="sv-img" src="" alt="">
  <div id="svTextOnly" class="sv-textonly hidden"></div>
  <div id="svOverlay" class="sv-overlay">
    <div class="sv-zone sv-zone-left"
      onpointerdown="svPointerDown(event)" onpointerup="svPointerUp(event,'left')" onpointercancel="svPointerUp(event,'left')"></div>
    <div class="sv-zone sv-zone-center"
      onpointerdown="svPointerDown(event)" onpointerup="svPointerUp(event,'center')" onpointercancel="svPointerUp(event,'center')"></div>
    <div class="sv-zone sv-zone-right"
      onpointerdown="svPointerDown(event)" onpointerup="svPointerUp(event,'right')" onpointercancel="svPointerUp(event,'right')"></div>
  </div>
</div>

<div id="lightbox" class="lightbox hidden">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-prev" onclick="lightboxMove(-1)">‹</button>
  <img id="lightboxImg" src="" alt="">
  <button class="lightbox-next" onclick="lightboxMove(1)">›</button>
</div>

<div id="loading" class="loading hidden"><div class="spinner"></div></div>
<div id="toast" class="toast"></div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbwbI25zmbvKOPQZtGttN_0vBY8gQhVL7lk2pJ7gM3NEw1SS4Y39r83wD_32oR3_l0Bzrw/exec';

const state={token:null,pin:'',entries:[],newPhotos:[],existing:[],editId:null,mood:'',
  calMonth:new Date().getMonth(),calYear:new Date().getFullYear(),tab:'timeline',detailId:null,searchQuery:''};

// ── API ──
async function apiGet(a,p={}){
  const q=new URLSearchParams({action:a,token:state.token||'',...p});
  const r=await fetch(API_URL+'?'+q);const j=await r.json();
  if(!j.ok)throw new Error(j.error);return j.data;
}
async function apiPost(a,p={}){
  const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({action:a,token:state.token,...p})});
  const j=await r.json();if(!j.ok)throw new Error(j.error);return j.data;
}

// ── Photo cache ──
let _db;
function db(){return _db||(_db=new Promise((res,rej)=>{const q=indexedDB.open('ourdiary',1);q.onupgradeneeded=()=>q.result.createObjectStore('photos');q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);}));}
async function cacheGet(k){const d=await db();return new Promise(r=>{const t=d.transaction('photos').objectStore('photos').get(k);t.onsuccess=()=>r(t.result);t.onerror=()=>r(null);});}
async function cacheSet(k,v){const d=await db();d.transaction('photos','readwrite').objectStore('photos').put(v,k);}
function driveThumbUrl(id,sz='w600'){return`https://drive.google.com/thumbnail?id=${id}&sz=${sz}`;}
function blobToDataUrl(b){return new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(b);});}
async function loadPhoto(id,sz='w600'){
  const k=id+'_'+sz,c=await cacheGet(k);if(c)return c;
  try{const r=await fetch(driveThumbUrl(id,sz));if(r.ok){const u=await blobToDataUrl(await r.blob());await cacheSet(k,u);return u;}}catch(e){}
  const cached=await cacheGet(id);if(cached)return cached;
  const d=await apiGet('photo',{id});await cacheSet(id,d.data||d);return d.data||d;
}
async function loadPhotoFull(id){return loadPhoto(id,'w2000');}

// ── PIN ──
function pinPress(d){if(state.pin.length>=6)return;state.pin+=d;renderDots();if(state.pin.length===6)submitPin();}
function pinDel(){state.pin=state.pin.slice(0,-1);renderDots();}
function pinClear(){state.pin='';renderDots();}
function renderDots(){document.querySelectorAll('#pinDots span').forEach((s,i)=>s.classList.toggle('on',i<state.pin.length));}
async function submitPin(){
  document.getElementById('pinError').textContent='';
  try{const d=await apiGet('login',{pin:state.pin});state.token=d.token;unlock();}
  catch(e){document.getElementById('pinError').textContent='Incorrect PIN';state.pin='';renderDots();navigator.vibrate&&navigator.vibrate(200);}
}
function unlock(){document.getElementById('lock').classList.add('hidden');document.getElementById('app').classList.remove('hidden');history.replaceState({app:true},'');loadAll();}

window.addEventListener('load',()=>{
  if('serviceWorker'in navigator)navigator.serviceWorker.register('service-worker.js').catch(()=>{});
});

// ── Android back button ──
window.addEventListener('popstate',()=>{
  // close overlays from top to bottom
  if(!document.getElementById('storyViewer').classList.contains('hidden')){closeStoryViewer(false);history.pushState({app:true},'');return;}
  if(!document.getElementById('lightbox').classList.contains('hidden')){closeLightbox(false);history.pushState({app:true},'');return;}
  if(!document.getElementById('mapPickerModal').classList.contains('hidden')){document.getElementById('mapPickerModal').classList.add('hidden');history.pushState({modal:'editor'},'');return;}
  if(!document.getElementById('dayModal').classList.contains('hidden')){closeDayModal(false);history.pushState({app:true},'');return;}
  if(!document.getElementById('editor').classList.contains('hidden')){closeEditor(false);history.pushState({app:true},'');return;}
  if(!document.getElementById('detail').classList.contains('hidden')){closeDetail(false);history.pushState({app:true},'');return;}
  if(state.searchQuery){clearSearch();history.pushState({app:true},'');return;}
  // nothing open — stay in app
  history.pushState({app:true},'');
});

// ── Data ──
function showLoading(b){document.getElementById('loading').classList.toggle('hidden',!b);}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
async function loadAll(){
  showLoading(true);
  try{const d=await apiGet('bootstrap');state.entries=d.entries;render();}
  catch(e){fail(e);}finally{showLoading(false);}
}
function fail(e){
  if(e.message==='UNAUTHORIZED'){location.reload();}
  else toast('Error: '+e.message);
}

// ── Tabs ──
function switchTab(t){
  state.tab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  if(t!=='atlas')hideAtlas();
  render();
}
function render(){({timeline:renderTimeline,calendar:renderCalendar,atlas:renderAtlas}[state.tab])();}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function pad(n){return(n<10?'0':'')+n;}
function todayIso(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function isoDate(v){if(!v)return'';return String(v).substring(0,10);}
function fmtDate(iso){
  if(!iso)return'';
  const p=isoDate(iso).split('-');
  const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return m[+p[1]-1]+' '+p[2]+', '+p[0];
}
function emptyHtml(i,t,s){return`<div class="empty"><div class="big">${i}</div><h3>${t}</h3><p>${s}</p></div>`;}

// ── Timeline ──
async function renderTimeline(){
  const v=document.getElementById('view');
  const q=state.searchQuery.toLowerCase();
  const src=q?state.entries.filter(e=>(e.title||'').toLowerCase().includes(q)||(e.body||'').toLowerCase().includes(q)):state.entries;
  if(!src.length&&!q){v.innerHTML=emptyHtml('📖','No entries yet','Tap + to start your story');return;}
  if(!src.length){v.innerHTML=emptyHtml('🔍','No results',`Nothing matched "${esc(state.searchQuery)}"`);return;}
  const storyHtml=q?'':`<div id="storyBar" class="story-bar">
    <div class="story-item" onclick="openEditor()">
      <div class="story-ring"><div class="story-emoji">＋</div></div>
      <span class="story-label">New</span>
    </div></div>`;
  const groups={};
  src.forEach(e=>{const d=isoDate(e.entryDate);if(!groups[d])groups[d]=[];groups[d].push(e);});
  const days=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  v.innerHTML=storyHtml+days.map(d=>`<div class="day-divider">${fmtDate(d)}</div>${groups[d].map(entryCard).join('')}`).join('');
  hydratePhotos();
  if(!q)loadThrowbackStories();
}
async function loadThrowbackStories(){
  try{
    const list=await apiGet('throwbacks');
    if(!list.items||!list.items.length)return;
    const bar=document.getElementById('storyBar');if(!bar)return;
    // จัดกลุ่มตามปี (yearsAgo)
    const byYear={};
    list.items.forEach(e=>{
      if(!state.entries.find(x=>x.id===e.id))state.entries.push(e);
      (byYear[e.yearsAgo]=byYear[e.yearsAgo]||[]).push(e);
    });
    // เรียง: ใหม่สุด (1y) ซ้ายสุด → เก่าสุด ขวาสุด
    const years=Object.keys(byYear).map(Number).sort((a,b)=>a-b);
    state.throwbackYears=years.map(y=>({yearsAgo:y,entries:byYear[y]}));
    years.forEach(y=>{
      const entries=byYear[y];
      // thumbnail: รูปแรกของ entry แรกที่มีรูป ไม่งั้นใช้ emoji
      const e0=entries.find(e=>e.photoIds&&e.photoIds.length)||entries[0];
      const fp=e0.photoIds&&e0.photoIds.length?e0.photoIds[0]:null;
      const item=document.createElement('div');item.className='story-item';
      item.onclick=()=>openStoryViewer(y);
      item.innerHTML=`<div class="story-ring">${fp?`<img data-photo="${fp}" alt="">`:
        `<div class="story-emoji">${e0.mood||'📸'}</div>`}</div>
        <span class="story-label">${y}y ago</span>`;
      bar.appendChild(item);
    });
    hydratePhotos(bar);
  }catch(e){}
}

// ── Story Viewer (IG-style) ──
function openStoryViewer(startYear){
  // สร้าง flat slides list ตั้งแต่ startYear ไปปีที่เก่ากว่า
  const allYears=state.throwbackYears||[];
  const startIdx=allYears.findIndex(g=>g.yearsAgo===startYear);
  if(startIdx<0)return;
  const slides=[];
  allYears.slice(startIdx).forEach(g=>{
    g.entries.forEach(e=>{
      if(e.photoIds&&e.photoIds.length){
        e.photoIds.forEach(pid=>slides.push({entry:e,photoId:pid,yearsAgo:g.yearsAgo}));
      }else{
        slides.push({entry:e,photoId:null,yearsAgo:g.yearsAgo});
      }
    });
  });
  if(!slides.length)return;
  state.story={slides,idx:0,paused:false,timer:null,startTs:0,elapsed:0};
  document.getElementById('storyViewer').classList.remove('hidden');
  history.pushState({modal:'story'},'');
  renderStorySlide();
}

function renderStorySlide(){
  const s=state.story;if(!s)return;
  const slide=s.slides[s.idx];
  // progress bars
  const bars=s.slides.map((_,i)=>{
    const fill=i<s.idx?100:i===s.idx?0:0;
    return `<div class="sv-bar"><div class="sv-bar-fill" id="svBar${i}" style="width:${fill}%"></div></div>`;
  }).join('');
  document.getElementById('svBars').innerHTML=bars;
  // content
  const img=document.getElementById('svImg');
  if(slide.photoId){
    img.style.display='block';img.src='';
    loadPhotoFull(slide.photoId).then(d=>{if(state.story&&s.slides[s.idx]===slide)img.src=d;});
    document.getElementById('svTextOnly').classList.add('hidden');
  }else{
    img.style.display='none';
    document.getElementById('svTextOnly').classList.remove('hidden');
    document.getElementById('svTextOnly').innerHTML=`<div style="font-size:48px">${slide.entry.mood||'📝'}</div>
      <div style="font-size:18px;font-weight:600;margin-top:14px;padding:0 24px">${esc(slide.entry.title||'')}</div>
      <div style="font-size:14px;margin-top:10px;padding:0 24px;line-height:1.5;opacity:.9;max-width:500px">${esc((slide.entry.body||'').substring(0,180))}</div>`;
  }
  const tEl=document.getElementById('svTitle');
  if(slide.entry.title){tEl.textContent=slide.entry.title;tEl.style.display='';}
  else tEl.style.display='none';
  document.getElementById('svYears').textContent=`${slide.yearsAgo} year${slide.yearsAgo>1?'s':''} ago`;
  startStoryTimer();
}

function startStoryTimer(){
  const s=state.story;if(!s)return;
  clearInterval(s.timer);
  s.startTs=Date.now();s.elapsed=0;
  const DURATION=5000;
  const bar=document.getElementById('svBar'+s.idx);
  s.timer=setInterval(()=>{
    if(s.paused)return;
    const now=Date.now();
    s.elapsed+=now-s.startTs;s.startTs=now;
    const pct=Math.min(100,(s.elapsed/DURATION)*100);
    if(bar)bar.style.width=pct+'%';
    if(s.elapsed>=DURATION)storyNext();
  },50);
}

function storyNext(){
  const s=state.story;if(!s)return;
  clearInterval(s.timer);
  if(s.idx>=s.slides.length-1){closeStoryViewer();return;}
  s.idx++;renderStorySlide();
}
function storyPrev(){
  const s=state.story;if(!s)return;
  clearInterval(s.timer);
  // reset current bar
  const cb=document.getElementById('svBar'+s.idx);if(cb)cb.style.width='0%';
  if(s.idx===0){startStoryTimer();return;}
  s.idx--;renderStorySlide();
}
function storyPause(){const s=state.story;if(!s)return;s.paused=true;document.getElementById('svOverlay').style.opacity='0';}
function storyResume(){const s=state.story;if(!s)return;s.paused=false;s.startTs=Date.now();document.getElementById('svOverlay').style.opacity='1';}
function storyOpenEntry(){
  const s=state.story;if(!s)return;
  const id=s.slides[s.idx].entry.id;
  closeStoryViewer();
  setTimeout(()=>openDetail(id),50);
}
function closeStoryViewer(pushBack=true){
  if(state.story){clearInterval(state.story.timer);state.story=null;}
  document.getElementById('storyViewer').classList.add('hidden');
  if(pushBack)history.back();
}

// gestures
let _svHoldTimer=null,_svHoldFired=false;
function svPointerDown(ev){
  ev.preventDefault();
  _svHoldFired=false;
  _svHoldTimer=setTimeout(()=>{_svHoldFired=true;storyPause();},200);
}
function svPointerUp(ev,zone){
  clearTimeout(_svHoldTimer);
  if(_svHoldFired){storyResume();return;}
  if(zone==='left')storyPrev();
  else if(zone==='right')storyNext();
  else storyOpenEntry();
}
function entryCard(e){
  const n=e.photoIds&&e.photoIds.length;
  const thumb=n?`<div style="position:relative;flex-shrink:0">
    <img class="entry-thumb" data-photo="${e.photoIds[0]}" alt="">
    ${n>1?`<div style="position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.55);color:#fff;font-size:10px;font-weight:700;padding:2px 5px;border-radius:8px;display:flex;align-items:center;gap:2px"><span style="font-size:9px">⊞</span>${n}</div>`:''}
  </div>`:'';
  return `<div class="entry" onclick="openDetail('${e.id}')">
    <div style="display:flex;gap:12px;align-items:flex-start">
      <div style="flex:1;min-width:0">
        <div class="entry-date">${e.mood?`<span class="mood-badge">${e.mood}</span> `:''}${fmtDate(isoDate(e.entryDate))}</div>
        ${e.title?`<div class="entry-title">${esc(e.title)}</div>`:''}
        ${e.body?`<div class="entry-body">${esc(e.body)}</div>`:''}
        ${e.location?`<div class="entry-meta">📍 ${esc(e.location)}</div>`:''}
      </div>${thumb}
    </div>
  </div>`;
}
function hydratePhotos(scope=document){
  scope.querySelectorAll('img[data-photo]').forEach(async img=>{
    const id=img.getAttribute('data-photo');img.removeAttribute('data-photo');
    try{img.src=await loadPhoto(id);}catch(e){}
  });
}

// ── Detail ──
function openDetail(id){
  state.detailId=id;
  const e=state.entries.find(x=>x.id===id);if(!e)return;
  document.getElementById('detailTitle').textContent=e.title||fmtDate(isoDate(e.entryDate));
  const photos=e.photoIds&&e.photoIds.length
    ?`<div class="detail-photos">${e.photoIds.map((pid,i)=>`<img data-photo="${pid}" alt="" onclick="openLightbox('${e.id}',${i})">`).join('')}</div>`:'';
  document.getElementById('detailBody').innerHTML=`
    <div class="detail-date">${fmtDate(isoDate(e.entryDate))}${e.mood?' · '+e.mood:''}</div>
    ${e.title?`<div class="detail-title">${esc(e.title)}</div>`:''}
    ${e.body?`<div class="detail-body">${esc(e.body)}</div>`:''}
    ${e.location?`<div class="detail-meta">📍 ${esc(e.location)}</div>`:''}
    ${photos}
    <div class="row-btns" style="margin-top:28px">
      <button class="danger" onclick="removeEntryFromDetail('${e.id}')">Delete entry</button>
    </div>`;
  document.getElementById('detail').classList.remove('hidden');
  document.getElementById('detailBody').scrollTop=0;
  hydratePhotos(document.getElementById('detailBody'));
  history.pushState({modal:'detail'},'');
}
function closeDetail(pushState=true){
  document.getElementById('detail').classList.add('hidden');
  if(pushState)history.back();
}
function editFromDetail(){
  document.getElementById('detail').classList.add('hidden');
  // replaceState แทน back() เพื่อไม่ให้ popstate ไปปิด editor
  history.replaceState({modal:'editor'},'');
  openEditor(state.detailId, true);
}
async function removeEntryFromDetail(id){
  if(!confirm('Delete this entry permanently?'))return;
  showLoading(true);
  try{await apiPost('deleteEntry',{id});closeDetail();await loadAll();}
  catch(e){fail(e);}finally{showLoading(false);}
}

// ── Calendar ──
function renderCalendar(){
  const v=document.getElementById('view');
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOWS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const today=todayIso(),nowY=new Date().getFullYear();
  const years=new Set(state.entries.map(e=>+isoDate(e.entryDate).split('-')[0]));
  years.add(nowY);
  const minY=Math.min(...years),maxY=nowY+1;
  const yRange=Array.from({length:maxY-minY+1},(_,i)=>minY+i);
  const mOpts=MN.map((n,i)=>`<option value="${i}"${i===state.calMonth?' selected':''}>${n}</option>`).join('');
  const yOpts=yRange.map(y=>`<option value="${y}"${y===state.calYear?' selected':''}>${y}</option>`).join('');
  let html='';
  for(let m=0;m<12;m++){
    const byDay={};
    state.entries.forEach(e=>{
      const d=isoDate(e.entryDate),p=d.split('-');
      if(+p[0]===state.calYear&&+p[1]===m+1){
        const day=+p[2];
        if(!byDay[day])byDay[day]={fp:e.photoIds&&e.photoIds.length?e.photoIds[0]:null};
      }
    });
    const first=new Date(state.calYear,m,1).getDay(),days=new Date(state.calYear,m+1,0).getDate();
    let c=DOWS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
    for(let i=0;i<first;i++)c+=`<div class="cal-cell blank"></div>`;
    for(let d=1;d<=days;d++){
      const info=byDay[d],iso=state.calYear+'-'+pad(m+1)+'-'+pad(d),isT=iso===today;
      c+=info
        ?`<div class="cal-cell has${isT?' today':''}" onclick="openDay(${state.calYear},${m+1},${d})">${info.fp?`<img data-photo="${info.fp}" alt="">`:''}<span class="cal-num">${d}</span></div>`
        :`<div class="cal-cell${isT?' today':''}">${d}</div>`;
    }
    html+=`<div class="cal-month-block" id="cal-m-${m}"><div class="cal-month-label">${MN[m]} ${state.calYear}</div><div class="cal-grid">${c}</div></div>`;
  }
  v.innerHTML=`<div class="cal-jump"><select onchange="state.calMonth=+this.value;jumpCalMonth()">${mOpts}</select><select onchange="state.calYear=+this.value;renderCalendar()">${yOpts}</select></div>${html}`;
  hydratePhotos(v);
  requestAnimationFrame(()=>{const el=document.getElementById('cal-m-'+state.calMonth);if(el)el.scrollIntoView({behavior:'auto',block:'start'});});
}
function jumpCalMonth(){const el=document.getElementById('cal-m-'+state.calMonth);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
function openDay(y,m,d){
  const iso=y+'-'+pad(m)+'-'+pad(d);
  const entries=state.entries.filter(e=>isoDate(e.entryDate)===iso);
  if(!entries.length)return;
  if(entries.length===1){openDetail(entries[0].id);return;}
  document.getElementById('dayModalTitle').textContent=fmtDate(iso);
  document.getElementById('dayModalBody').innerHTML=entries.map(e=>`
    <div class="day-entry" onclick="closeDayModal();openDetail('${e.id}')">
      ${e.mood?`<span class="mood-badge">${e.mood}</span> `:''}
      ${e.title?`<strong>${esc(e.title)}</strong><br>`:''}
      ${e.body?`<span style="font-size:13px;color:#5a4a4e">${esc(e.body.substring(0,80))}${e.body.length>80?'…':''}</span>`:''}
    </div>`).join('');
  document.getElementById('dayModal').classList.remove('hidden');
  history.pushState({modal:'dayModal'},'');
}
function closeDayModal(pushState=true){document.getElementById('dayModal').classList.add('hidden');if(pushState)history.back();}

// ── Lightbox ──
const _lb={ids:[],idx:0};
async function openLightbox(entryId,idx){
  const e=state.entries.find(x=>x.id===entryId);if(!e||!e.photoIds.length)return;
  _lb.ids=e.photoIds;_lb.idx=idx;
  document.getElementById('lightbox').classList.remove('hidden');
  await showLightboxPhoto(idx);
  history.pushState({modal:'lightbox'},'');
}
async function showLightboxPhoto(idx){
  const img=document.getElementById('lightboxImg');img.style.opacity='.4';
  try{img.src=await loadPhotoFull(_lb.ids[idx]);}catch(e){}
  img.style.opacity='1';
  document.querySelector('.lightbox-prev').style.visibility=idx>0?'visible':'hidden';
  document.querySelector('.lightbox-next').style.visibility=idx<_lb.ids.length-1?'visible':'hidden';
}
async function lightboxMove(dir){const n=_lb.idx+dir;if(n<0||n>=_lb.ids.length)return;_lb.idx=n;await showLightboxPhoto(n);}
function closeLightbox(pushState=true){document.getElementById('lightbox').classList.add('hidden');if(pushState)history.back();}
document.addEventListener('keydown',e=>{
  if(document.getElementById('lightbox').classList.contains('hidden'))return;
  if(e.key==='ArrowLeft')lightboxMove(-1);if(e.key==='ArrowRight')lightboxMove(1);if(e.key==='Escape')closeLightbox();
});

// ── Editor ──
function openEditor(id, skipPush=false){
  state.newPhotos=[];state.existing=[];state.mood='';state.editId=id||null;
  document.getElementById('photoPreview').innerHTML='';document.getElementById('existingPhotos').innerHTML='';
  document.getElementById('f_photos').value='';
  document.querySelectorAll('#moodPicker span').forEach(s=>s.classList.remove('sel'));
  if(id){
    const e=state.entries.find(x=>x.id===id);
    document.getElementById('editorTitle').textContent='Edit Entry';
    document.getElementById('f_id').value=e.id;
    document.getElementById('f_date').value=isoDate(e.entryDate);
    document.getElementById('f_title').value=e.title||'';document.getElementById('f_body').value=e.body||'';
    document.getElementById('f_location').value=e.location||'';state.mood=e.mood||'';
    if(e.mood)document.querySelectorAll('#moodPicker span').forEach(s=>{if(s.textContent===e.mood)s.classList.add('sel');});
    state.existing=e.photoIds.slice();renderExisting();
    document.getElementById('f_lat').value=e.lat||'';document.getElementById('f_lng').value=e.lng||'';
    setGpsLabel(e.lat,e.lng);
    document.getElementById('deleteBtn').classList.remove('hidden');
  }else{
    document.getElementById('editorTitle').textContent='New Entry';
    document.getElementById('f_id').value='';document.getElementById('f_date').value=todayIso();
    document.getElementById('f_title').value='';document.getElementById('f_body').value='';document.getElementById('f_location').value='';
    document.getElementById('f_lat').value='';document.getElementById('f_lng').value='';
    setGpsLabel(null,null);
    document.getElementById('deleteBtn').classList.add('hidden');
  }
  document.getElementById('editor').classList.remove('hidden');
  if(!skipPush)history.pushState({modal:'editor'},'');
}
function closeEditor(pushState=true){document.getElementById('editor').classList.add('hidden');if(pushState)history.back();}
function pickMood(el,m){document.querySelectorAll('#moodPicker span').forEach(s=>s.classList.remove('sel'));if(state.mood===m){state.mood='';}else{state.mood=m;el.classList.add('sel');}}
function previewPhotos(){
  const files=Array.from(document.getElementById('f_photos').files);
  document.getElementById('f_photos').value='';
  files.forEach(file=>{
    // ดึง GPS จาก EXIF (เฉพาะรูปแรกที่มี GPS เท่านั้น ไม่ทับของเดิมถ้ามีอยู่แล้ว)
    if(typeof exifr!=='undefined'){
      exifr.gps(file).then(gps=>{
        console.log('[EXIF]',file.name,gps);
        const hasExisting=document.getElementById('f_lat').value;
        if(gps&&gps.latitude&&gps.longitude&&!hasExisting){
          document.getElementById('f_lat').value=gps.latitude;
          document.getElementById('f_lng').value=gps.longitude;
          setGpsLabel(gps.latitude,gps.longitude);
          toast('📍 GPS read from photo');
        }else if(!gps||!gps.latitude){
          console.log('[EXIF] no GPS in',file.name);
        }
      }).catch(err=>console.log('[EXIF error]',err));
    }
    const reader=new FileReader();
    reader.onload=ev=>{
      const idx=state.newPhotos.length;
      state.newPhotos.push({name:file.name,mimeType:file.type,data:ev.target.result.split(',')[1]});
      const div=document.createElement('div');div.className='pp';
      div.innerHTML=`<img src="${ev.target.result}"><button class="del" onclick="removeNewPhoto(${idx},this)">✕</button>`;
      document.getElementById('photoPreview').appendChild(div);
    };
    reader.readAsDataURL(file);
  });
}
function removeNewPhoto(idx,btn){state.newPhotos[idx]=null;btn.parentElement.remove();}
async function renderExisting(){
  const box=document.getElementById('existingPhotos');box.innerHTML='';
  state.existing.forEach(id=>{const div=document.createElement('div');div.className='pp';
    div.innerHTML=`<img data-photo="${id}"><button class="del" onclick="removeExisting('${id}',this)">✕</button>`;box.appendChild(div);});
  hydratePhotos(box);
}
async function removeExisting(fileId,btn){
  if(!confirm('Delete this photo?'))return;
  try{await apiPost('deletePhoto',{entryId:state.editId,fileId});
    state.existing=state.existing.filter(x=>x!==fileId);btn.parentElement.remove();
    const e=state.entries.find(x=>x.id===state.editId);if(e)e.photoIds=state.existing.slice();
  }catch(e){fail(e);}
}
async function saveEntry(){
  const payload={id:document.getElementById('f_id').value,entryDate:document.getElementById('f_date').value,
    title:document.getElementById('f_title').value,body:document.getElementById('f_body').value,
    location:document.getElementById('f_location').value,mood:state.mood,weather:'',
    lat:document.getElementById('f_lat').value||null,lng:document.getElementById('f_lng').value||null,
    photos:state.newPhotos.filter(Boolean)};
  const hasExisting=state.existing&&state.existing.length;
  if(!payload.body&&!payload.title&&!payload.location&&!payload.photos.length&&!hasExisting){toast('Add something first 💕');return;}
  showLoading(true);document.getElementById('saveBtn').disabled=true;
  try{await apiPost(payload.id?'updateEntry':'addEntry',payload);closeEditor();await loadAll();toast('Saved 💕');}
  catch(e){fail(e);}finally{document.getElementById('saveBtn').disabled=false;showLoading(false);}
}
async function removeEntry(){
  if(!confirm('Delete this entry permanently?'))return;
  showLoading(true);
  try{await apiPost('deleteEntry',{id:state.editId});closeEditor();await loadAll();}
  catch(e){fail(e);}finally{showLoading(false);}
}

// ── Search ──
function toggleSearch(){
  const tb=document.getElementById('topbar');
  const opening=!tb.classList.contains('searching');
  tb.classList.toggle('searching',opening);
  if(opening)setTimeout(()=>document.getElementById('searchInput').focus(),50);
  else clearSearch();
}
function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('topbar').classList.remove('searching');
  state.searchQuery='';
  if(state.tab==='timeline')renderTimeline();
}
function onSearch(q){
  state.searchQuery=q.trim();
  if(state.tab!=='timeline')switchTab('timeline');
  else renderTimeline();
}

// ── Atlas ──
let _leafletLoaded=false;
async function loadLeaflet(){
  if(_leafletLoaded)return;
  await new Promise(res=>{const s=document.createElement('script');s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';s.onload=res;document.head.appendChild(s);});
  await new Promise(res=>{const s=document.createElement('script');s.src='https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js';s.onload=res;document.head.appendChild(s);});
  _leafletLoaded=true;
}
let _map=null,_clusterGroup=null;
async function renderAtlas(){
  document.getElementById('app').classList.add('atlas-active');
  document.getElementById('atlasMap').classList.add('visible');
  const geo=state.entries.filter(e=>e.lat&&e.lng);
  const mapEl=document.getElementById('atlasMap');
  if(!geo.length){
    if(!mapEl.querySelector('.atlas-no-loc')){
      const msg=document.createElement('div');msg.className='atlas-no-loc';
      msg.innerHTML='<div style="font-size:36px">🗺️</div><h3 style="margin:8px 0 4px">No locations yet</h3><p style="color:var(--muted);font-size:13px;margin:0">New entries will capture GPS automatically</p>';
      mapEl.appendChild(msg);
    }return;
  }
  await loadLeaflet();
  const topH=document.querySelector('.topbar').offsetHeight,botH=document.querySelector('.tabbar').offsetHeight;
  mapEl.style.top=topH+'px';mapEl.style.bottom=botH+'px';
  if(!_map){
    _map=L.map('atlasMap',{zoomControl:true});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(_map);
    _clusterGroup=L.markerClusterGroup({maxClusterRadius:60,iconCreateFunction:cluster=>{
      const n=cluster.getChildCount();
      return L.divIcon({html:`<div style="background:var(--pink);color:#fff;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.25)">${n}</div>`,className:'',iconSize:[44,44]});
    }});
    _map.addLayer(_clusterGroup);
  }else{_clusterGroup.clearLayers();}
  geo.forEach(e=>{
    const iconEl=document.createElement('div');iconEl.className='photo-marker no-photo';iconEl.textContent='📸';
    const marker=L.marker([e.lat,e.lng],{icon:L.divIcon({html:iconEl.outerHTML,className:'',iconSize:[52,52],iconAnchor:[26,26]})});
    marker.on('click',()=>openDetail(e.id));_clusterGroup.addLayer(marker);
    if(e.photoIds&&e.photoIds.length){
      loadPhoto(e.photoIds[0]).then(src=>{
        const el=document.createElement('div');el.className='photo-marker';el.innerHTML=`<img src="${src}">`;
        marker.setIcon(L.divIcon({html:el.outerHTML,className:'',iconSize:[52,52],iconAnchor:[26,26]}));
      }).catch(()=>{});
    }
  });
  const bounds=L.latLngBounds(geo.map(e=>[e.lat,e.lng]));
  _map.fitBounds(bounds,{padding:[40,40]});
  setTimeout(()=>_map.invalidateSize(),100);
}
function hideAtlas(){document.getElementById('app').classList.remove('atlas-active');document.getElementById('atlasMap').classList.remove('visible');}

// ── GPS ──
function setGpsLabel(lat,lng){
  const el=document.getElementById('gpsLabel');if(!el)return;
  const clearBtn=document.getElementById('clearGpsBtn');
  if(lat&&lng){
    el.textContent=`📍 ${(+lat).toFixed(4)}, ${(+lng).toFixed(4)}`;
    el.style.color='var(--pink)';
    if(clearBtn)clearBtn.classList.remove('hidden');
  }else{
    el.textContent='📍 GPS will be read from photo';
    el.style.color='var(--muted)';
    if(clearBtn)clearBtn.classList.add('hidden');
  }
}
function clearGps(){
  document.getElementById('f_lat').value='';
  document.getElementById('f_lng').value='';
  setGpsLabel(null,null);
}

// ── Map Picker ──
let _pickerMap=null,_pickerMarker=null,_pickerLat=null,_pickerLng=null,_searchTimer=null;

async function openMapPicker(){
  _pickerLat=null;_pickerLng=null;
  document.getElementById('mapPickerCoords').textContent='Tap on map to drop a pin';
  document.getElementById('mapPickerConfirm').disabled=true;
  document.getElementById('mapSearchInput').value='';
  document.getElementById('mapSearchResults').style.display='none';
  document.getElementById('mapPickerModal').classList.remove('hidden');
  history.pushState({modal:'mapPicker'},'');
  await loadLeaflet();
  setTimeout(()=>{
    if(!_pickerMap){
      _pickerMap=L.map('mapPickerMap',{zoomControl:true});
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(_pickerMap);
      _pickerMap.on('click',e=>pickerPlacePin(e.latlng.lat,e.latlng.lng));
    }
    const curLat=+document.getElementById('f_lat').value;
    const curLng=+document.getElementById('f_lng').value;
    if(curLat&&curLng){
      _pickerMap.setView([curLat,curLng],15);
      pickerPlacePin(curLat,curLng);
    }else{
      _pickerMap.setView([13.7563,100.5018],6);
      if(_pickerMarker){_pickerMarker.remove();_pickerMarker=null;}
    }
    _pickerMap.invalidateSize();
  },120);
}

function pickerPlacePin(lat,lng){
  _pickerLat=lat;_pickerLng=lng;
  const ll=L.latLng(lat,lng);
  if(_pickerMarker)_pickerMarker.setLatLng(ll);
  else{
    _pickerMarker=L.marker(ll,{draggable:true}).addTo(_pickerMap);
    _pickerMarker.on('dragend',ev=>{
      const p=ev.target.getLatLng();
      _pickerLat=p.lat;_pickerLng=p.lng;
      updatePickerCoords();
    });
  }
  updatePickerCoords();
  document.getElementById('mapPickerConfirm').disabled=false;
}

function updatePickerCoords(){
  document.getElementById('mapPickerCoords').textContent=`📍 ${_pickerLat.toFixed(5)}, ${_pickerLng.toFixed(5)}`;
}

// Nominatim search (OSM geocoding — ฟรี ไม่ต้อง API key)
function onMapSearch(q){
  clearTimeout(_searchTimer);
  const box=document.getElementById('mapSearchResults');
  if(!q.trim()){box.style.display='none';return;}
  _searchTimer=setTimeout(async()=>{
    try{
      // Photon (Komoot) — autocomplete geocoder ฟรี ไม่จำกัด ไม่ต้อง API key
      const res=await fetch(`https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=6&lang=en`);
      const json=await res.json();
      const items=(json.features||[]).map(f=>{
        const p=f.properties||{},c=f.geometry.coordinates;
        const name=p.name||'';
        const detail=[p.street,p.city||p.county,p.state,p.country].filter(Boolean).join(', ');
        return {lat:c[1],lon:c[0],name,detail};
      });
      if(!items.length){box.innerHTML='<div style="padding:12px;text-align:center;color:var(--muted);font-size:13px">No results</div>';box.style.display='block';return;}
      box.innerHTML=items.map(r=>`
        <div onclick="pickerSelectResult(${r.lat},${r.lon},this)"
          style="padding:10px 14px;cursor:pointer;border-bottom:1px solid var(--pink-bg);font-size:13px;line-height:1.4">
          <div style="font-weight:600;color:var(--ink)">${esc(r.name||r.detail)}</div>
          <div style="color:var(--muted);font-size:11px">${esc(r.detail)}</div>
        </div>`).join('');
      box.style.display='block';
    }catch(e){box.style.display='none';}
  },400);
}

function pickerSelectResult(lat,lng,el){
  document.getElementById('mapSearchResults').style.display='none';
  document.getElementById('mapSearchInput').value=el.querySelector('div').textContent;
  _pickerMap.setView([+lat,+lng],15);
  pickerPlacePin(+lat,+lng);
}

// ปิด search dropdown เมื่อแตะนอก
document.addEventListener('click',e=>{
  if(!e.target.closest('#mapSearchInput')&&!e.target.closest('#mapSearchResults'))
    document.getElementById('mapSearchResults').style.display='none';
});

// closeMapPicker ไม่ซ่อน modal เอง — ให้ popstate เป็นคนซ่อน
function closeMapPicker(){history.back();}

function useMyLocation(){
  if(!navigator.geolocation){toast('Geolocation not supported');return;}
  toast('Getting your location...');
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    _pickerMap.setView([lat,lng],16);
    pickerPlacePin(lat,lng);
  },err=>{
    const msg=err.code===1?'Permission denied — please enable location in browser settings':'Could not get location';
    toast(msg);
  },{timeout:10000,enableHighAccuracy:true});
}
function confirmMapPicker(){
  if(_pickerLat===null)return;
  document.getElementById('f_lat').value=_pickerLat;
  document.getElementById('f_lng').value=_pickerLng;
  setGpsLabel(_pickerLat,_pickerLng);
  history.back(); // popstate จะซ่อน modal แล้วกลับไป editor
}
</script>
