<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ff7a9c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Our Diary</title>
<style>
:root{--pink:#ff7a9c;--pink-soft:#ffd9e2;--pink-bg:#fff5f7;--ink:#3a2c30;--muted:#9a8a8f;--shadow:0 4px 18px rgba(255,122,156,.15)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,"Segoe UI","Sukhumvit Set","Noto Sans Thai",sans-serif;background:var(--pink-bg);color:var(--ink)}
.hidden{display:none!important}
/* lock */
.lock{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#ffe3ea,#ffd0dd);padding-top:env(safe-area-inset-top)}
.lock-card{text-align:center;width:300px}
.lock-heart{font-size:52px;animation:beat 1.4s infinite}
@keyframes beat{0%,100%{transform:scale(1)}20%{transform:scale(1.2)}40%{transform:scale(1)}}
.lock-card h1{margin:6px 0 2px;font-size:26px;color:var(--pink)}
.lock-sub{color:var(--muted);font-size:13px;margin-bottom:22px}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:10px}
.pin-dots span{width:14px;height:14px;border-radius:50%;border:2px solid var(--pink);transition:.15s}
.pin-dots span.on{background:var(--pink)}
.pin-error{color:#e8456b;height:18px;font-size:13px}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px}
.keypad button{height:64px;border:none;border-radius:50%;font-size:24px;background:#fff;color:var(--ink);box-shadow:var(--shadow);cursor:pointer;transition:.1s}
.keypad button:active{transform:scale(.92);background:var(--pink-soft)}
.keypad .ghost{background:transparent;box-shadow:none;color:var(--pink)}
/* shell */
.app{min-height:100vh;padding-bottom:calc(76px + env(safe-area-inset-bottom))}
.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:calc(14px + env(safe-area-inset-top)) 18px 14px;background:rgba(255,245,247,.9);backdrop-filter:blur(8px)}
.brand{font-weight:700;color:var(--pink);font-size:18px}
.add-btn{border:none;background:var(--pink);color:#fff;padding:8px 16px;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:var(--shadow)}
.view{padding:12px 16px;max-width:560px;margin:0 auto}
.tabbar{position:fixed;bottom:0;left:0;right:0;display:flex;background:#fff;border-top:1px solid var(--pink-soft);padding:6px 0 calc(10px + env(safe-area-inset-bottom))}
.tab{flex:1;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:20px;color:var(--muted)}
.tab span{font-size:11px}.tab.active{color:var(--pink)}
/* entry */
.entry{background:#fff;border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow);cursor:pointer}
.entry-date{font-size:12px;color:var(--pink);font-weight:600}
.entry-title{font-size:17px;font-weight:700;margin:4px 0}
.entry-body{color:#5a4a4e;font-size:14px;white-space:pre-wrap}
.entry-meta{font-size:12px;color:var(--muted);margin-top:8px;display:flex;gap:10px;flex-wrap:wrap}
.entry-photos{display:flex;gap:6px;margin-top:10px;overflow-x:auto}
.entry-photos img{height:90px;border-radius:12px;object-fit:cover;background:var(--pink-soft);min-width:90px}
.mood-badge{font-size:20px}
.empty{text-align:center;color:var(--muted);padding:60px 20px}.empty .big{font-size:48px}
.section-title{font-size:13px;color:var(--muted);margin:4px 0 12px;font-weight:600}
/* calendar */
.cal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cal-head button{border:none;background:var(--pink-soft);color:var(--pink);border-radius:10px;padding:6px 12px;font-size:16px;cursor:pointer}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:11px;color:var(--muted);padding:4px 0}
.cal-cell{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;background:#fff;position:relative}
.cal-cell.has{background:var(--pink-soft);cursor:pointer;font-weight:700}
.cal-cell.has .dot{position:absolute;bottom:5px;width:5px;height:5px;border-radius:50%;background:var(--pink)}
.cal-cell.blank{background:transparent}
/* anniv */
.anniv{background:#fff;border-radius:16px;padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:center;gap:10px}
.anniv .count{font-size:22px;font-weight:800;color:var(--pink)}
.anniv .label{font-size:11px;color:var(--muted)}
.anniv .x{border:none;background:none;color:var(--muted);font-size:16px;cursor:pointer}
/* modal */
.modal{position:fixed;inset:0;z-index:50;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.35)}
.modal-card{background:#fff;width:100%;max-width:560px;border-radius:24px 24px 0 0;max-height:92vh;overflow-y:auto;animation:slideUp .25s}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;font-weight:700;font-size:17px;position:sticky;top:0;background:#fff}
.modal-head .x{border:none;background:none;font-size:18px;cursor:pointer;color:var(--muted)}
.modal-body{padding:0 18px calc(24px + env(safe-area-inset-bottom))}
.modal-body label{display:block;font-size:13px;color:var(--muted);margin:14px 0 6px}
.modal-body input[type=text],.modal-body input[type=date],.modal-body input[type=number],.modal-body textarea{width:100%;padding:11px 13px;border:1px solid var(--pink-soft);border-radius:12px;font-size:15px;font-family:inherit;background:var(--pink-bg)}
.modal-body textarea{resize:vertical}
.checkbox{display:flex!important;align-items:center;gap:8px}.checkbox input{width:auto}
.mood-picker{display:flex;gap:8px;flex-wrap:wrap}
.mood-picker span{font-size:26px;cursor:pointer;padding:4px;border-radius:10px;opacity:.5;transition:.1s}
.mood-picker span.sel{opacity:1;background:var(--pink-soft);transform:scale(1.1)}
.photo-preview{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.photo-preview .pp{position:relative}
.photo-preview img{height:72px;width:72px;object-fit:cover;border-radius:10px;background:var(--pink-soft)}
.photo-preview .del{position:absolute;top:-6px;right:-6px;background:#e8456b;color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer}
.modal-actions{display:flex;gap:10px;margin-top:22px}
.modal-actions button{flex:1;border:none;padding:13px;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer}
.primary{background:var(--pink);color:#fff}.danger{background:#ffe0e6;color:#e8456b}
.loading{position:fixed;inset:0;background:rgba(255,245,247,.6);display:flex;align-items:center;justify-content:center;z-index:99}
.spinner{width:40px;height:40px;border:4px solid var(--pink-soft);border-top-color:var(--pink);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#3a2c30;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;z-index:120;opacity:0;transition:.3s}
.toast.show{opacity:.95}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock" class="lock">
  <div class="lock-card">
    <div class="lock-heart">💗</div>
    <h1>Our Diary</h1>
    <p class="lock-sub">ใส่รหัสเพื่อเปิดความทรงจำของเรา</p>
    <div id="pinDots" class="pin-dots"><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div id="pinError" class="pin-error"></div>
    <div class="keypad">
      <button onclick="pinPress('1')">1</button><button onclick="pinPress('2')">2</button><button onclick="pinPress('3')">3</button>
      <button onclick="pinPress('4')">4</button><button onclick="pinPress('5')">5</button><button onclick="pinPress('6')">6</button>
      <button onclick="pinPress('7')">7</button><button onclick="pinPress('8')">8</button><button onclick="pinPress('9')">9</button>
      <button class="ghost" onclick="pinClear()">C</button><button onclick="pinPress('0')">0</button><button class="ghost" onclick="pinDel()">⌫</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">
  <header class="topbar"><div class="brand">💗 Our Diary</div><button class="add-btn" onclick="openEditor()">＋ บันทึก</button></header>
  <main id="view" class="view"></main>
  <nav class="tabbar">
    <button class="tab active" data-tab="timeline" onclick="switchTab('timeline')">📖<span>Timeline</span></button>
    <button class="tab" data-tab="calendar" onclick="switchTab('calendar')">📅<span>ปฏิทิน</span></button>
    <button class="tab" data-tab="throwback" onclick="switchTab('throwback')">⏳<span>Throwback</span></button>
    <button class="tab" data-tab="anniv" onclick="switchTab('anniv')">🎉<span>ครบรอบ</span></button>
  </nav>
</div>

<!-- EDITOR -->
<div id="editor" class="modal hidden"><div class="modal-card">
  <div class="modal-head"><span id="editorTitle">บันทึกใหม่</span><button class="x" onclick="closeEditor()">✕</button></div>
  <div class="modal-body">
    <input type="hidden" id="f_id">
    <label>วันที่</label><input type="date" id="f_date">
    <label>หัวข้อ</label><input type="text" id="f_title" placeholder="วันนี้เราไป...">
    <label>อารมณ์วันนี้</label>
    <div id="moodPicker" class="mood-picker">
      <span onclick="pickMood(this,'😍')">😍</span><span onclick="pickMood(this,'😊')">😊</span><span onclick="pickMood(this,'🥰')">🥰</span>
      <span onclick="pickMood(this,'😌')">😌</span><span onclick="pickMood(this,'😢')">😢</span><span onclick="pickMood(this,'😡')">😡</span><span onclick="pickMood(this,'🤗')">🤗</span>
    </div>
    <label>เรื่องราว</label><textarea id="f_body" rows="6" placeholder="เล่าเรื่องวันนี้..."></textarea>
    <label>สถานที่ (ไม่บังคับ)</label><input type="text" id="f_location" placeholder="เช่น คาเฟ่ริมทะเล">
    <label>รูปภาพ</label><input type="file" id="f_photos" accept="image/*" multiple onchange="previewPhotos()">
    <div id="photoPreview" class="photo-preview"></div><div id="existingPhotos" class="photo-preview"></div>
    <div class="modal-actions">
      <button id="deleteBtn" class="danger hidden" onclick="removeEntry()">ลบ</button>
      <button class="primary" id="saveBtn" onclick="saveEntry()">บันทึก</button>
    </div>
  </div>
</div></div>

<!-- ANNIV -->
<div id="annivModal" class="modal hidden"><div class="modal-card">
  <div class="modal-head"><span>เพิ่มวันครบรอบ</span><button class="x" onclick="closeAnniv()">✕</button></div>
  <div class="modal-body">
    <label>ชื่อโอกาส</label><input type="text" id="a_title" placeholder="เช่น วันครบรอบแต่งงาน">
    <label>วันที่</label><input type="date" id="a_date">
    <label class="checkbox"><input type="checkbox" id="a_recurring" checked> เกิดซ้ำทุกปี</label>
    <label>เตือนล่วงหน้า (วัน)</label><input type="number" id="a_remind" value="3" min="0">
    <label>โน้ต (ไม่บังคับ)</label><input type="text" id="a_note" placeholder="ไอเดียของขวัญ ฯลฯ">
    <div class="modal-actions"><button class="primary" onclick="saveAnniv()">เพิ่ม</button></div>
  </div>
</div></div>

<div id="loading" class="loading hidden"><div class="spinner"></div></div>
<div id="toast" class="toast"></div>

<script>
// ====== CONFIG: วาง URL ของ GAS Web App (/exec) ที่นี่ ======
const API_URL = 'https://script.google.com/macros/s/AKfycbwbI25zmbvKOPQZtGttN_0vBY8gQhVL7lk2pJ7gM3NEw1SS4Y39r83wD_32oR3_l0Bzrw/exec';

// ====== STATE ======
const state={token:null,pin:'',entries:[],anniversaries:[],newPhotos:[],existing:[],editId:null,mood:'',
  calMonth:new Date().getMonth(),calYear:new Date().getFullYear(),tab:'timeline'};

// ====== API (fetch) ======
// อ่าน = GET ?action=... ; เขียน = POST text/plain (เลี่ยง CORS preflight)
async function apiGet(action,params={}){
  const q=new URLSearchParams({action,token:state.token||'',...params});
  const r=await fetch(API_URL+'?'+q.toString());
  const j=await r.json();
  if(!j.ok) throw new Error(j.error);
  return j.data;
}
async function apiPost(action,payload={}){
  const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({action,token:state.token,...payload})});
  const j=await r.json();
  if(!j.ok) throw new Error(j.error);
  return j.data;
}

// ====== PHOTO CACHE (IndexedDB) ======
let _db;
function db(){return _db||(_db=new Promise((res,rej)=>{const q=indexedDB.open('ourdiary',1);
  q.onupgradeneeded=()=>q.result.createObjectStore('photos');q.onsuccess=()=>res(q.result);q.onerror=()=>rej(q.error);}));}
async function cacheGet(id){const d=await db();return new Promise(r=>{const t=d.transaction('photos').objectStore('photos').get(id);t.onsuccess=()=>r(t.result);t.onerror=()=>r(null);});}
async function cacheSet(id,data){const d=await db();d.transaction('photos','readwrite').objectStore('photos').put(data,id);}
// คืน dataURL ของรูป (เช็ค cache ก่อน ไม่มีค่อยขอ API แล้ว cache)
async function loadPhoto(id){
  const c=await cacheGet(id); if(c) return c;
  const d=await apiGet('photo',{id}); await cacheSet(id,d.data||d); return d.data||d;
}

// ====== PIN LOCK ======
function pinPress(d){if(state.pin.length>=6)return;state.pin+=d;renderDots();if(state.pin.length===6)submitPin();}
function pinDel(){state.pin=state.pin.slice(0,-1);renderDots();}
function pinClear(){state.pin='';renderDots();}
function renderDots(){document.querySelectorAll('#pinDots span').forEach((s,i)=>s.classList.toggle('on',i<state.pin.length));}
async function submitPin(){
  document.getElementById('pinError').textContent='';
  try{
    const d=await apiGet('login',{pin:state.pin}); // login ไม่ต้อง token
    state.token=d.token; localStorage.setItem('od_token',d.token); unlock();
  }catch(e){
    document.getElementById('pinError').textContent='รหัสไม่ถูกต้อง';
    state.pin='';renderDots();navigator.vibrate&&navigator.vibrate(200);
  }
}
function unlock(){document.getElementById('lock').classList.add('hidden');document.getElementById('app').classList.remove('hidden');loadAll();}

window.addEventListener('load',()=>{
  const t=localStorage.getItem('od_token'); if(t){state.token=t;unlock();}
  if('serviceWorker'in navigator) navigator.serviceWorker.register('service-worker.js').catch(()=>{});
});

// ====== DATA ======
function showLoading(b){document.getElementById('loading').classList.toggle('hidden',!b);}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
async function loadAll(){
  showLoading(true);
  try{
    const d=await apiGet('bootstrap');        // ดึง entries+anniv ในครั้งเดียว
    state.entries=d.entries; state.anniversaries=d.anniversaries;
    render();
  }catch(e){ fail(e); } finally{ showLoading(false); }
}
function fail(e){
  if(e.message==='UNAUTHORIZED'){localStorage.removeItem('od_token');location.reload();}
  else toast('ผิดพลาด: '+e.message);
}

// ====== TABS ======
function switchTab(tab){state.tab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));render();}
function render(){({timeline:renderTimeline,calendar:renderCalendar,throwback:renderThrowback,anniv:renderAnniv}[state.tab])();}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function pad(n){return(n<10?'0':'')+n;}
function todayIso(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function thDate(iso){if(!iso)return'';const p=iso.split('-');const m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return +p[2]+' '+m[+p[1]-1]+' '+(+p[0]+543);}
function emptyHtml(i,t,s){return`<div class="empty"><div class="big">${i}</div><h3>${t}</h3><p>${s}</p></div>`;}

// ====== TIMELINE ======
function renderTimeline(){
  const v=document.getElementById('view');
  if(!state.entries.length){v.innerHTML=emptyHtml('📖','ยังไม่มีบันทึก','กด "＋ บันทึก" เพื่อเริ่มเรื่องราวของเรา');return;}
  v.innerHTML=state.entries.map(entryCard).join('');
  hydratePhotos();
}
function entryCard(e){
  const photos=e.photoIds.map(id=>`<img data-photo="${id}" alt="">`).join('');
  const meta=e.location?`<div class="entry-meta">📍 ${esc(e.location)}</div>`:'';
  return `<div class="entry" onclick="openEditor('${e.id}')">
    <div class="entry-date">${thDate(e.entryDate)}${e.mood?' · <span class="mood-badge">'+e.mood+'</span>':''}</div>
    ${e.title?`<div class="entry-title">${esc(e.title)}</div>`:''}
    ${e.body?`<div class="entry-body">${esc(e.body)}</div>`:''}
    ${photos?`<div class="entry-photos">${photos}</div>`:''}${meta}</div>`;
}
// โหลดรูปจาก cache/API (ขนานกัน)
function hydratePhotos(scope=document){
  scope.querySelectorAll('img[data-photo]').forEach(async img=>{
    const id=img.getAttribute('data-photo');img.removeAttribute('data-photo');
    try{img.src=await loadPhoto(id);}catch(e){}
  });
}

// ====== CALENDAR ======
function renderCalendar(){
  const v=document.getElementById('view');const y=state.calYear,m=state.calMonth;
  const mn=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const byDay={};state.entries.forEach(e=>{const p=(e.entryDate||'').split('-');if(+p[0]===y&&+p[1]===m+1)byDay[+p[2]]=true;});
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),dows=['อา','จ','อ','พ','พฤ','ศ','ส'];
  let c=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<first;i++)c+=`<div class="cal-cell blank"></div>`;
  for(let d=1;d<=days;d++){const h=byDay[d];c+=`<div class="cal-cell${h?' has':''}"${h?` onclick="openDay(${y},${m+1},${d})"`:''}>${d}${h?'<span class="dot"></span>':''}</div>`;}
  v.innerHTML=`<div class="cal-head"><button onclick="calMove(-1)">‹</button><strong>${mn[m]} ${y+543}</strong><button onclick="calMove(1)">›</button></div><div class="cal-grid">${c}</div>`;
}
function calMove(d){state.calMonth+=d;if(state.calMonth<0){state.calMonth=11;state.calYear--;}if(state.calMonth>11){state.calMonth=0;state.calYear++;}renderCalendar();}
function openDay(y,m,d){const iso=y+'-'+pad(m)+'-'+pad(d);const e=state.entries.find(x=>x.entryDate===iso);if(e)openEditor(e.id);}

// ====== THROWBACK ======
async function renderThrowback(){
  const v=document.getElementById('view');showLoading(true);
  try{
    const list=await apiGet('throwbacks');
    showLoading(false);
    if(!list.items.length){v.innerHTML=emptyHtml('⏳','ยังไม่มีความทรงจำของวันนี้','พอผ่านไปสักปี เรื่องราววันนี้จะกลับมาทักทาย 💕');return;}
    v.innerHTML='<div class="section-title">วันนี้ในอดีต 💕</div>'+list.items.map(e=>`
      <div class="entry" onclick="openEditor('${e.id}')">
        <div class="entry-date">${e.yearsAgo} ปีก่อน · ${thDate(e.entryDate)}</div>
        ${e.title?`<div class="entry-title">${esc(e.title)}</div>`:''}
        ${e.body?`<div class="entry-body">${esc(e.body)}</div>`:''}
        ${e.photoIds.length?`<div class="entry-photos">${e.photoIds.map(id=>`<img data-photo="${id}">`).join('')}</div>`:''}
      </div>`).join('');
    // merge throwback ที่ไม่อยู่ใน cache entries
    list.items.forEach(e=>{if(!state.entries.find(x=>x.id===e.id))state.entries.push(e);});
    hydratePhotos();
  }catch(e){showLoading(false);fail(e);}
}

// ====== ANNIV ======
function renderAnniv(){
  const v=document.getElementById('view');
  const add=`<button class="add-btn" style="width:100%;margin-bottom:14px" onclick="openAnniv()">＋ เพิ่มวันครบรอบ</button>`;
  if(!state.anniversaries.length){v.innerHTML=add+emptyHtml('🎉','ยังไม่มีวันครบรอบ','เพิ่มวันสำคัญเพื่อให้ระบบเตือนล่วงหน้า');return;}
  v.innerHTML=add+state.anniversaries.map(a=>{
    const label=a.daysUntil===0?'วันนี้! 🎉':'อีก '+a.daysUntil+' วัน';
    return `<div class="anniv"><div><div style="font-weight:700">${esc(a.title)}</div>
      <div class="label">${thDate(a.date)}${a.recurring?' · ทุกปี':''}${a.note?' · '+esc(a.note):''}</div></div>
      <div style="text-align:right"><div class="count">${a.daysUntil===0?'🎉':a.daysUntil}</div><div class="label">${label}</div></div>
      <button class="x" onclick="event.stopPropagation();removeAnniv('${a.id}')">✕</button></div>`;
  }).join('');
}

// ====== ENTRY EDITOR ======
function openEditor(id){
  state.newPhotos=[];state.existing=[];state.mood='';state.editId=id||null;
  document.getElementById('photoPreview').innerHTML='';document.getElementById('existingPhotos').innerHTML='';
  document.getElementById('f_photos').value='';
  document.querySelectorAll('#moodPicker span').forEach(s=>s.classList.remove('sel'));
  if(id){
    const e=state.entries.find(x=>x.id===id);
    document.getElementById('editorTitle').textContent='แก้ไขบันทึก';
    document.getElementById('f_id').value=e.id;document.getElementById('f_date').value=e.entryDate;
    document.getElementById('f_title').value=e.title||'';document.getElementById('f_body').value=e.body||'';
    document.getElementById('f_location').value=e.location||'';state.mood=e.mood||'';
    if(e.mood)document.querySelectorAll('#moodPicker span').forEach(s=>{if(s.textContent===e.mood)s.classList.add('sel');});
    state.existing=e.photoIds.slice();renderExisting();
    document.getElementById('deleteBtn').classList.remove('hidden');
  }else{
    document.getElementById('editorTitle').textContent='บันทึกใหม่';
    document.getElementById('f_id').value='';document.getElementById('f_date').value=todayIso();
    document.getElementById('f_title').value='';document.getElementById('f_body').value='';document.getElementById('f_location').value='';
    document.getElementById('deleteBtn').classList.add('hidden');
  }
  document.getElementById('editor').classList.remove('hidden');
}
function closeEditor(){document.getElementById('editor').classList.add('hidden');}
function pickMood(el,m){document.querySelectorAll('#moodPicker span').forEach(s=>s.classList.remove('sel'));if(state.mood===m){state.mood='';}else{state.mood=m;el.classList.add('sel');}}

function previewPhotos(){
  const files=document.getElementById('f_photos').files;
  Array.from(files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const b64=ev.target.result.split(',')[1];
      const idx=state.newPhotos.length;
      state.newPhotos.push({name:file.name,mimeType:file.type,data:b64});
      const div=document.createElement('div');div.className='pp';
      div.innerHTML=`<img src="${ev.target.result}"><button class="del" onclick="removeNewPhoto(${idx},this)">✕</button>`;
      document.getElementById('photoPreview').appendChild(div);
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('f_photos').value='';
}
function removeNewPhoto(idx,btn){state.newPhotos[idx]=null;btn.parentElement.remove();}
async function renderExisting(){
  const box=document.getElementById('existingPhotos');box.innerHTML='';
  state.existing.forEach(id=>{const div=document.createElement('div');div.className='pp';
    div.innerHTML=`<img data-photo="${id}"><button class="del" onclick="removeExisting('${id}',this)">✕</button>`;box.appendChild(div);});
  hydratePhotos(box);
}
async function removeExisting(fileId,btn){
  if(!confirm('ลบรูปนี้?'))return;
  try{await apiPost('deletePhoto',{entryId:state.editId,fileId});
    state.existing=state.existing.filter(x=>x!==fileId);btn.parentElement.remove();
    const e=state.entries.find(x=>x.id===state.editId);if(e)e.photoIds=state.existing.slice();
  }catch(e){fail(e);}
}
async function saveEntry(){
  const payload={id:document.getElementById('f_id').value,entryDate:document.getElementById('f_date').value,
    title:document.getElementById('f_title').value,body:document.getElementById('f_body').value,
    location:document.getElementById('f_location').value,mood:state.mood,weather:'',photos:state.newPhotos.filter(Boolean)};
  if(!payload.body&&!payload.title&&!payload.photos.length){toast('เขียนอะไรสักนิดก่อนนะ 💕');return;}
  showLoading(true);document.getElementById('saveBtn').disabled=true;
  try{await apiPost(payload.id?'updateEntry':'addEntry',payload);closeEditor();await loadAll();toast('บันทึกแล้ว 💕');}
  catch(e){fail(e);}finally{document.getElementById('saveBtn').disabled=false;showLoading(false);}
}
async function removeEntry(){
  if(!confirm('ลบบันทึกนี้ถาวร?'))return;
  showLoading(true);
  try{await apiPost('deleteEntry',{id:state.editId});closeEditor();await loadAll();}
  catch(e){fail(e);}finally{showLoading(false);}
}

// ====== ANNIV EDITOR ======
function openAnniv(){
  document.getElementById('a_title').value='';document.getElementById('a_date').value=todayIso();
  document.getElementById('a_recurring').checked=true;document.getElementById('a_remind').value=3;document.getElementById('a_note').value='';
  document.getElementById('annivModal').classList.remove('hidden');
}
function closeAnniv(){document.getElementById('annivModal').classList.add('hidden');}
async function saveAnniv(){
  const payload={title:document.getElementById('a_title').value,date:document.getElementById('a_date').value,
    recurring:document.getElementById('a_recurring').checked,remindDaysBefore:document.getElementById('a_remind').value,note:document.getElementById('a_note').value};
  if(!payload.title||!payload.date){toast('ใส่ชื่อและวันที่ด้วยนะ');return;}
  showLoading(true);
  try{await apiPost('addAnniv',payload);closeAnniv();await loadAll();}catch(e){fail(e);}finally{showLoading(false);}
}
async function removeAnniv(id){
  if(!confirm('ลบวันครบรอบนี้?'))return;showLoading(true);
  try{await apiPost('deleteAnniv',{id});await loadAll();}catch(e){fail(e);}finally{showLoading(false);}
}
</script>
